<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/output.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Register</title>
</head>
<body class="bg-[#eff4ff] min-h-screen flex flex-col">  
    <header  class="bg-white border shadow-md border-gray-400 justify-between px-5 py-2">
        <div class="flex items-center justify-between mx-auto">
           <h1 class="font-inter font-bold text-xl p-1">A-Ledger</h1> 
           <p class="font-label text-sm p-2">Already Have an Account? <a href="login.html" class="font-label font-semibold text-sky-500">Log in</a></p>
        </div>
    </header> 
    
    <!-- Stepper -->
     <ol>
        <li>

        </li>
        <li>

        </li>
        <li>
            
        </li>
     </ol>

    <main class="w-full flex flex-1 flex-col gap-4 justify-center items-center">
        <!-- Step 1 -->
        <div class="flex flex-col gap-3 mx-auto w-full max-w-[400px] bg-white p-5 rounded-xl border border-[#C6C6CD] shadow-xl">
            <div class="flex flex-col gap-1">
                <h2 class="font-inter text-xl font-bold">Create Account</h2>
                <p class="font-inter text-sm">Start your journey toward family financial clarity.</p>
            </div>
            <form action="" class="flex flex-col gap-3">
                <div class="flex flex-col gap-3">
                    <label for="fullName" class="font-label text-sm">Full Name</label>
                    <input type="text" id="fullName" placeholder="John Doe" class="w-full border border-gray-400 rounded-md shadow-sm p-2 font-inter text-sm font-medium">
                
                    <label for="email" class="font-label text-sm">Email Address</label>
                    <input type="email" id="email" placeholder="john@gmail.com" class="w-full border border-gray-400 rounded-md shadow-sm p-2 font-inter text-sm font-medium">
                    
                    <div class="flex gap-3">
                        <div class="flex flex-col gap-2">
                            <label for="password" class="font-label text-sm">Password</label>
                            <div class="relative">
                                <button class="absolute inset-y-0 right-0 pr-3 flex items-center"> <!-- Liat password -->
                                    <i class="leading-none fi fi-rr-eye"></i>
                                </button> 
                                <input type="password" id="password" placeholder="********" class="w-full border border-gray-400 rounded-md shadow-sm p-2 font-inter text-sm font-medium">
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label for="confPassword" class="font-label text-sm">Confirm Password</label>

                            <div class="relative">
                                <button class="absolute inset-y-0 right-0 pr-3 flex items-center"> <!-- Liat password -->
                                    <i class="leading-none fi fi-rr-eye"></i>
                                </button>
                                <input type="password" id="confPassword" placeholder="********" class="w-full border border-gray-400 rounded-md shadow-sm p-2 font-inter text-sm font-medium">
                            </div>
                        </div>
                    </div>
                </div>
                <button class="font-label text-sm text-white outline-1 rounded-md flex justify-center items-center h-10 bg-black gap-1">Next Step<i class="fa-sharp fa-solid fa-arrow-right"></i> </button>
            </form>
        </div>
        <!-- Step 2 -->

        <form action="">
            <div class="flex flex-col gap-3 mx-auto w-full max-w-[800px] bg-white p-5 rounded-xl border border-[#C6C6CD] shadow-xl">
                <div class="flex flex-col gap-1">
                    <h2 class="font-inter text-xl font-bold">Personalize your journey</h2>
                    <p class="font-inter text-sm">Tell us a bit more about yourself to help tailor your family's dashboard.</p>
                </div>
                <!-- Profile Picture -->
                <div>
                    <div>

                    </div>
                    <div>
                        <p class="font-label text-sm">Profile Picture</p>
                        <p class="font-inter text-sm">Upload an image to set your profile picture.</p>
                    </div>
                </div>

                <div class="flex gap-3">
                    <div class="flex flex-col gap-2">
                        <label for="birthDate" class="font-label text-sm">Date of Birth</label>
                        <div class="relative">
                            <input type="date" id="birthDate" class="w-full border border-gray-400 rounded-md shadow-sm p-2 font-inter text-sm font-medium">
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label for="phoneNum" class="font-label text-sm">Phone Number</label>
                        <div class="relative">
                            <button class="absolute inset-y-0 right-0 pr-2 flex items-center"> <!-- Liat password -->
                                <i class="fa-solid fa-phone"></i>
                            </button>
                            <input type="tel" id="phoneNum" placeholder="+62 xxxxxxx" class="w-full border border-gray-400 rounded-md shadow-sm p-2 font-inter text-sm font-medium">
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-1">
                    <p class="font-label text-sm">Role in Family</p>
                    <div class="flex flex-row gap-2">
                        <button class="flex flex-col w-full h-20 items-center justify-center border border-gray-400 rounded-md p-2 bg-white hover:bg-blue-500 text-black hover:text-white font-inter text-sm">
                            <i class="fa-regular fa-user"></i>
                            <span class="font-inter text-sm">Head</span>
                        </button>
                        <button class="flex flex-col w-full 20 items-center justify-center border border-gray-400 rounded-md p-2 bg-white hover:bg-blue-500 text-black hover:text-white font-inter text-sm">
                            <i class="fa-solid fa-user-group"></i>
                            <span class="font-inter text-sm">Partner</span>
                        </button>
                        <button class="flex flex-col w-full 20 items-center justify-center border border-gray-400 rounded-md p-2 bg-white hover:bg-blue-500 text-black hover:text-white font-inter text-sm">
                            <i class="fa-regular fa-face-smile"></i>
                            <span class="font-inter text-sm">Dependent</span>
                        </button>
                        <button class="flex flex-col w-full 20 items-center justify-center border border-gray-400 rounded-md p-2 bg-white hover:bg-blue-500 text-black hover:text-white font-inter text-sm">
                            <i class="fa-solid fa-ellipsis"></i>
                            <span class="font-inter text-sm">Other</span>
                        </button>
                    </div>
                </div>
                <div class="flex flex-col gap-1">
                    <label for="bio" class="font-label text-sm">Short Bio (Optional)</label>
                    <textarea name="bio" id="bio" maxlength="150" placeholder="E.g. Setting goals for the new year..." class="border border-gray-400 rounded-md p-2 h-20 font-inter text-sm"></textarea>
                </div>
            </div>
        </form>

        <!-- Step 3 -->
         <div>

         </div>
    </main>

</body>
</html>
